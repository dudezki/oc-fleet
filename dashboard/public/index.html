// ─── Destructure Vue globals ─────────────────────────────────────────────────
const { createApp, ref, reactive, computed, onMounted, watch, nextTick, h } = Vue;

const state = reactive({

// ─── Agents drawer state ──────────────────────────────────────────────────────
const agentsDrawer = reactive({ open: false });
const restartAllDrawer = reactive({ open: false, logs: [], done: false, error: '', total: 0, current: 0, running: false });
const agentConfigDrawer = reactive({ open: false, name: '', id: '', emoji: '', model: '', provider: 'anthropic', health: 'unknown', draft: { system_prompt: '', skill_map: '', behaviors: '', api_key: '', base_url: '' }, saving: false, saved: false, editing: false, decommissioning: false, decommissionConfirm: '', decommissionError: '', decommissionDone: false, providerSaving: false, providerSaved: false, providerError: '' });

const spawnDrawer = reactive({ open: false });
const plusMenu = reactive({ open: false });

async function sendOrchestrate() {
  if (!orchestrateDrawer.userId || !orchestrateDrawer.message.trim() || orchestrateDrawer.sending) return;
  orchestrateDrawer.sending = true; orchestrateDrawer.result = null;
  try {
    const r = await fetch('/api/orchestrate/send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_telegram_id: orchestrateDrawer.userId, agent_name: orchestrateDrawer.agentName, chat_type: orchestrateDrawer.chatType, group_chat_id: orchestrateDrawer.groupChatId, message: orchestrateDrawer.message }),
    });
    orchestrateDrawer.result = await r.json();
    orchestrateDrawer.message = '';
  } catch(e) { orchestrateDrawer.result = { error: e.message }; }
  orchestrateDrawer.sending = false;
}
const spawnForm = reactive({ name: '', slug: '', description: '', department: 'general', bot_token: '', model: 'claude-haiku-4-5' });
const spawnProgress = reactive({ active: false, steps: [], currentStep: 0, totalSteps: 10, done: false, error: '', result: null, drawerOpen: false });

Vue.watch(() => spawnForm.name, (val) => {
  spawnForm.slug = val.toLowerCase().replace(/fleet-?/i,'').replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
});

async function doSpawn() {
  if (!spawnForm.name || !spawnForm.description || !spawnForm.bot_token) return;
  spawnProgress.active = true;
  spawnProgress.steps = [];
  spawnProgress.currentStep = 0;
  spawnProgress.done = false;
  spawnProgress.error = '';
  spawnProgress.result = null;
  spawnProgress.drawerOpen = true;
  spawnDrawer.open = false;
  try {
    const resp = await fetch('/api/agents/spawn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...spawnForm }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const msg = JSON.parse(line.slice(6));
          if (msg.error) { spawnProgress.error = msg.error; spawnProgress.active = false; break; }
          if (msg.done) { spawnProgress.done = true; spawnProgress.result = msg.agent; spawnProgress.active = false; _agentMetaCache = null; break; }
          if (msg.step) {
            spawnProgress.currentStep = msg.step;
            spawnProgress.totalSteps = msg.total || 10;
            const existing = spawnProgress.steps.find(s => s.step === msg.step);
            if (existing) { Object.assign(existing, msg); } else { spawnProgress.steps.push({ ...msg }); }
          }
        } catch {}
      }
    }
  } catch(e) { spawnProgress.error = e.message; spawnProgress.active = false; }
}
// AGENT_META is loaded dynamically from /api/agents — no hardcoded list
let _agentMetaCache = null;
async function getAgentMeta() {
  if (_agentMetaCache) return _agentMetaCache;
  try {
    const r = await fetch('/api/agents');
    const agents = await r.json();
    _agentMetaCache = {};
    for (const a of agents) {
      _agentMetaCache[a.slug] = { id: a.id, emoji: a.emoji || '🤖', model: a.model || 'haiku' };
    }
  } catch { _agentMetaCache = {}; }
  return _agentMetaCache;
}
async function openAgentConfig(name, inst) {
  _agentMetaCache = null; // always fresh on open
  const agentMeta = await getAgentMeta();
  const meta = agentMeta[name];
  if (!meta) { console.warn('openAgentConfig: no meta for', name); return; }
  const health = inst?.health || inst?.status || 'unknown';
  try {
    const r = await fetch('/api/agent-configs');
    const d = await r.json();
    const cfg = d[name] || {};
    Object.assign(agentConfigDrawer, {
      open: true, name, ...meta, health,
      provider: meta.provider || 'anthropic',
      draft: {
        system_prompt: cfg.system_prompt || '',
        skill_map: cfg.skill_map ? JSON.stringify(cfg.skill_map, null, 2) : '{}',
        behaviors: cfg.behaviors ? JSON.stringify(cfg.behaviors, null, 2) : '{}',
        api_key: '', base_url: '',
      },
      saving: false, saved: false, editing: false,
      decommissioning: false, decommissionConfirm: '', decommissionError: '', decommissionDone: false,
      providerSaving: false, providerSaved: false, providerError: '',
    });
  } catch {}
}
const PROVIDER_MODELS = {
  anthropic:  ['claude-haiku-4-5', 'claude-sonnet-4-6', 'claude-opus-4-6'],
  openai:     ['gpt-4o-mini', 'gpt-4o', 'gpt-4-turbo', 'o1', 'o3-mini'],
  google:     ['google/gemini-2.5-pro-preview-03-25', 'google/gemini-2.5-flash', 'google/gemini-2.0-flash', 'google/gemini-3.1-pro-preview'],
  openrouter: [],

};

// Resolve display label for any model string
function modelLabel(model) {
  if (!model) return 'unknown';
  const m = String(model);
  if (m.includes('gemini-2.5-pro')) return 'gemini-2.5-pro';
  if (m.includes('gemini-2.5-flash')) return 'gemini-2.5-flash';
  if (m.includes('gemini-2.0')) return 'gemini-2.0-flash';
  if (m.includes('gemini-3.1-pro')) return 'gemini-3.1-pro';
  if (m.includes('gemini')) return 'gemini';
  if (m.includes('sonnet')) return 'sonnet';
  if (m.includes('opus')) return 'opus';
  if (m.includes('haiku')) return 'haiku';
  if (m.includes('gpt-4o')) return 'gpt-4o';

}

function modelBadgeClass(model) {

async function saveProviderConfig() {
  agentConfigDrawer.providerSaving = true;
  agentConfigDrawer.providerError = '';
  try {
    const r = await fetch(`/api/agents/${agentConfigDrawer.name}/provider`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: agentConfigDrawer.provider,
        model: agentConfigDrawer.model,
        api_key: agentConfigDrawer.draft.api_key || undefined,
        base_url: agentConfigDrawer.draft.base_url || undefined,
      }),
    });
    const d = await r.json();
    if (!d.ok) { agentConfigDrawer.providerError = d.error || 'Failed'; return; }
    agentConfigDrawer.providerSaved = true;
    _agentMetaCache = null;
    setTimeout(() => { agentConfigDrawer.providerSaved = false; }, 3000);
  } catch (e) { agentConfigDrawer.providerError = e.message; }
  agentConfigDrawer.providerSaving = false;
}

async function doDecommission() {
  agentConfigDrawer.decommissionError = '';
  try {
    const r = await fetch('/api/agents/decommission', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: agentConfigDrawer.name, confirm_name: agentConfigDrawer.decommissionConfirm }),
    });
    const d = await r.json();
    if (!d.ok) { agentConfigDrawer.decommissionError = d.error || 'Failed'; return; }
    agentConfigDrawer.decommissionDone = true;
    _agentMetaCache = null;
    setTimeout(() => { agentConfigDrawer.open = false; }, 1500);
  } catch (e) { agentConfigDrawer.decommissionError = e.message; }
}
async function saveAgentConfig() {
  agentConfigDrawer.saving = true; agentConfigDrawer.saved = false;
  let skill_map, behaviors;
  try { skill_map = JSON.parse(agentConfigDrawer.draft.skill_map); } catch { skill_map = {}; }
  try { behaviors = JSON.parse(agentConfigDrawer.draft.behaviors); } catch { behaviors = {}; }
  try {
    await fetch(`/api/agent-configs/${agentConfigDrawer.id}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system_prompt: agentConfigDrawer.draft.system_prompt, skill_map, behaviors }),
    });
    agentConfigDrawer.saved = true;
    agentConfigDrawer.editing = false;
    setTimeout(() => agentConfigDrawer.saved = false, 3000);
  } catch {}
  agentConfigDrawer.saving = false;
}

const drawer = reactive({
  open: false, conv: null, messages: [], loading: false,
  sending: false, inputText: '',
  context: { conversationId: null, userId: null, agentName: null, chatType: 'dm', groupChatId: null },
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
const AGENT_MAP = {
  'b81c0d8a': 'Sales', '325e5143': 'Support', '82061d1c': 'Manager',
  '87a2838e': 'Dev',   '20dc090b': 'IT',
};
// Configure marked with highlight.js for code blocks
try {
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    langPrefix: 'hljs language-',
  });
} catch {}

function renderMd(str) {
  if (!str) return '';
  try { return marked.parse(str); } catch { return '<pre>' + str + '</pre>'; }
}

function highlightJson(str) {
  if (!str || typeof str !== 'string') return str;
  const escaped = str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    (match) => {
      let cls = 'color:#6ee7b7'; // number — green
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'color:#93c5fd' : 'color:#fcd34d'; // key=blue, string=yellow
      } else if (/true|false/.test(match)) {
        cls = 'color:#f87171'; // bool — red
      } else if (/null/.test(match)) {
        cls = 'color:#9ca3af'; // null — gray
      }
      return `<span style="${cls}">${match}</span>`;
    }
  );
}

function agentLabel(id) {
  if (!id) return '—';
  return AGENT_MAP[id?.slice(0, 8)] || (id?.slice(0, 8) + '…');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString();
}
function fmtRel(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return new Date(iso).toLocaleDateString();
}
function truncate(str, n = 80) {
  if (!str) return '—';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://' + location.host);
  ws.addEventListener('open', () => { state.wsConnected = true; });
  ws.addEventListener('message', (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        const d = msg.data;
        state.instances = d.instances || [];
        state.proxy = d.proxy || null;
        const mem = d.memories;
        state.memories = Array.isArray(mem) ? mem : (mem?.memories || mem?.data || []);
        const hof = d.handoffs;
        state.handoffs = Array.isArray(hof) ? hof : (hof?.handoffs || hof?.data || []);
        state.bindings = d.bindings || [];
        state.accounts = d.accounts || [];
        state.conversations = d.conversations || [];
        state.tasks = d.tasks || [];
        state.skills = d.skills || [];
        state.updatedAt = d.updatedAt;
      }
    } catch {}
  });
  ws.addEventListener('close', () => { state.wsConnected = false; setTimeout(connectWS, 3000); });
  ws.addEventListener('error', () => { state.wsConnected = false; ws.close(); });
}
connectWS();

// Fallback REST if WS state doesn't arrive in 2s
setTimeout(() => {
  if (!state.instances.length) {
    fetch('/api/status').then(r => r.json()).then(d => {
      state.instances = d.instances || [];
      state.proxy = d.proxy || null;
    }).catch(() => {});
  }
}, 2000);

// ─── Drawer helpers ───────────────────────────────────────────────────────────
async function openDrawer(conv) {
  drawer.conv = conv;
  drawer.open = true;
  drawer.messages = [];
  drawer.inputText = '';
  drawer.loading = true;
  drawer.context = {
    conversationId: conv.id,
    userId: null,
    agentName: conv.agent_name,
    chatType: 'dm',
    groupChatId: null,
  };
  try {
    const r = await fetch(`/api/conversations/${conv.id}/messages`);
    drawer.messages = await r.json();
  } catch {}
  drawer.loading = false;
  await nextTick();
  const el = document.getElementById('drawer-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

async function sendDrawerMessage() {
  if (!drawer.inputText.trim() || drawer.sending) return;
  const text = drawer.inputText.trim();
  drawer.inputText = '';
  drawer.sending = true;
  drawer.messages.push({ role: 'user', content: text, created_at: new Date().toISOString() });
  await nextTick();
  const el = document.getElementById('drawer-messages');
  if (el) el.scrollTop = el.scrollHeight;
  try {
    const r = await fetch('/api/orchestrate/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_telegram_id: drawer.context.userId || '0',
        agent_name: (drawer.context.agentName || 'sales').toLowerCase(),
        chat_type: drawer.context.chatType || 'dm',
        group_chat_id: drawer.context.groupChatId || '',
        message: text,
      }),
    });
    const d = await r.json();
    if (d.agent_reply) {
      drawer.messages.push({ role: 'assistant', content: d.agent_reply, created_at: new Date().toISOString() });
    }
  } catch {}
  drawer.sending = false;
  await nextTick();
  if (el) el.scrollTop = el.scrollHeight;
}

const FleetStatus = {
  setup() {
    const cards = computed(() => {
      return state.instances.map(i => ({ ...i, isProxy: false }));
    });

    async function restart(card) {
      if (card.isProxy) {
        await fetch('/api/proxy/restart', { method: 'POST' });
      } else {
        await fetch(`/api/restart/${card.name}`, { method: 'POST' });
      }
    }
    async function stop(card) {
      await fetch(`/api/stop/${card.name}`, { method: 'POST' });
    }

    const CARD_LABELS = { sales: 'Sales :20010', support: 'Support :20020', manager: 'Manager :20030', dev: 'Dev :20040', it: 'IT :20050', proxy: 'Proxy :20000' };

    const AGENT_MAP = {
      sales:   { id: "b81c0d8a-3f76-43fe-b2e5-2537801085dc", emoji: "💼", model: "haiku" },
      support: { id: "325e5143-3c0b-4d65-b548-a34cbdba5949", emoji: "🎧", model: "haiku" },
      manager: { id: "82061d1c-2c79-4cfb-9e18-b8223b95a7c2", emoji: "📊", model: "haiku" },
      dev:     { id: "87a2838e-e145-4f5c-99e2-c759f0591cba", emoji: "💻", model: "sonnet" },
      it:      { id: "20dc090b-90a3-403f-acc3-a1ac7008596d", emoji: "🔧", model: "haiku" },
    };
    const configDrawer = ref(null);
    const configSaving = ref(false);
    const configSaved = ref(false);

    async function openConfig(card) {
      if (card.isProxy) return;
      const info = AGENT_MAP[card.name];
      if (!info) return;
      try {
        const r = await fetch("/api/agent-configs");
        const d = await r.json();
        const cfg = d[card.name] || {};
        configDrawer.value = {
          name: card.name, ...info,
          draft: {
            system_prompt: cfg.system_prompt || "",
            skill_map: cfg.skill_map ? JSON.stringify(cfg.skill_map, null, 2) : "{}",
            behaviors: cfg.behaviors ? JSON.stringify(cfg.behaviors, null, 2) : "{}",
          }
        };
        configSaved.value = false;
      } catch {}
    }

    function closeConfig() { configDrawer.value = null; }

    async function saveConfig() {
      if (!configDrawer.value) return;
      configSaving.value = true; configSaved.value = false;
      let skill_map, behaviors;
      try { skill_map = JSON.parse(configDrawer.value.draft.skill_map); } catch { skill_map = {}; }
      try { behaviors = JSON.parse(configDrawer.value.draft.behaviors); } catch { behaviors = {}; }
      try {
        await fetch(`/api/agent-configs/${configDrawer.value.id}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ system_prompt: configDrawer.value.draft.system_prompt, skill_map, behaviors }),
        });
        configSaved.value = true;
        setTimeout(() => configSaved.value = false, 2000);
      } catch {}
      configSaving.value = false;
    }

    return { cards, restart, stop, CARD_LABELS, fmtRel, configDrawer, configSaving, configSaved, openConfig, closeConfig, saveConfig, AGENT_MAP };
  },
  template: `
    <div class="p-6">
      <h1 class="text-xl font-bold mb-6 text-white">Fleet Status</h1>
      <div class="grid grid-cols-2 gap-4">
        <div v-for="card in cards" :key="card.name"
             class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col gap-3">

      { key: 'completed', label: 'Completed' },
      { key: 'rejected',  label: 'Rejected' },
    ];
    const isNew = (h) => {
      if (!h.created_at) return false;
      return (Date.now() - new Date(h.created_at).getTime()) < 3600000; // < 1 hour
    };
    const badgeClass = (s) => ({
      pending:   'bg-yellow-500/20 text-yellow-300 border border-yellow-700',
      accepted:  'bg-green-500/20 text-green-300 border border-green-700',
      completed: 'bg-blue-500/20 text-blue-300 border border-blue-700',
      rejected:  'bg-red-500/20 text-red-300 border border-red-700',
    }[s] || 'bg-gray-700 text-gray-400');
    const filtered = Vue.computed(() => {
      const all = state.handoffs;
      if (activeTab.value === 'all') return all;
      return all.filter(h => h.status === activeTab.value);

const Accounts = {
  setup() {
    const { ref, reactive, computed } = Vue;
    const router = VueRouter.useRouter();
    const openAccount = (a) => { router.push(`/accounts/${a.id}`); };

    const roleBadge = (r) => ({ admin: 'bg-red-900/40 text-red-300 border-red-800', team_lead: 'bg-yellow-900/40 text-yellow-300 border-yellow-800', agent: 'bg-gray-700 text-gray-300 border-gray-600' }[r] || 'bg-gray-700 text-gray-300');

    const search = ref('');
    const filtered = computed(() => {
      const q = search.value.toLowerCase();
      if (!q) return state.accounts;
      return state.accounts.filter(a =>
        (a.name||'').toLowerCase().includes(q) ||
        (a.email||'').toLowerCase().includes(q) ||
        (a.department||'').toLowerCase().includes(q) ||
        (a.role||'').toLowerCase().includes(q)
      );
    });

    const otpModal = reactive({ open: false, email: '', code: '', expires_at: null, loading: false, error: '', copied: false });

    async function getOtp(a, e) {
      e.stopPropagation();
      otpModal.open = true; otpModal.email = a.email; otpModal.code = ''; otpModal.error = ''; otpModal.loading = true; otpModal.copied = false;
      try {
        let d = await fetch(`/api/accounts/${a.id}/otp`).then(r => r.json());
        if (!d.found) d = await fetch(`/api/accounts/${a.id}/generate-otp`, { method: 'POST' }).then(r => r.json());
        if (d.found && d.otp_code) {
          otpModal.code = d.otp_code; otpModal.expires_at = d.expires_at;
          try { await navigator.clipboard.writeText(d.otp_code); otpModal.copied = true; } catch {}
        } else { otpModal.error = d.error || 'OTP not available'; }
      } catch(err) { otpModal.error = err.message; }
      otpModal.loading = false;
    }

    function expiresIn(ts) {
      if (!ts) return '?';
      const diff = Math.round((new Date(ts) - Date.now()) / 1000);
      if (diff <= 0) return 'expired';
      const m = Math.floor(diff / 60), s = diff % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    return { accounts: filtered, total: computed(() => state.accounts.length), search, openAccount, roleBadge, fmtDate, fmtRel, getOtp, otpModal, expiresIn };
  },
  template: `

      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">

            <tr class="text-gray-500 border-b border-gray-800">

              <th class="text-left py-2 pr-4 font-medium">Email</th>
              <th class="text-left py-2 pr-4 font-medium">Role</th>
              <th class="text-left py-2 pr-4 font-medium">Department</th>
              <th class="text-left py-2 pr-4 font-medium">Status</th>
              <th class="text-left py-2 pr-4 font-medium">Permissions</th>
              <th class="text-left py-2 font-medium">OTP</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="a in accounts" :key="a.id"

              <td class="py-2 pr-4 text-gray-200 font-medium">{{ a.name }}</td>

                <span :class="roleBadge(a.role)" class="px-2 py-0.5 rounded border text-xs">{{ a.role }}</span>
              </td>
              <td class="py-2 pr-4 text-gray-400">{{ a.department || '—' }}</td>
              <td class="py-2 pr-4">
                <span :class="a.is_active ? 'text-green-400' : 'text-red-400'" class="text-xs">
                  ● {{ a.is_active ? 'Active' : 'Inactive' }}

              </td>

                <span v-for="p in (a.permissions?.fleet || [])" :key="p"

              </td>

const AccountProfile = {
  setup() {
    const { ref, computed, onMounted, watch } = Vue;
    const route = VueRouter.useRoute();
    const router = VueRouter.useRouter();
    const id = computed(() => route.params.id);

    // Account + binding from WS state (no polling)
    const account = computed(() => (state.accounts || []).find(a => String(a.id) === String(id.value)));
    const binding  = computed(() => (state.bindings || []).find(b => b.email === account.value?.email) || null);

    // On-demand fetches (only when tab opened)
    const skills    = ref([]);
    const otpHistory= ref([]);
    const activity  = ref(null);
    const bindForm  = reactive({ open: false, telegram_id: '', telegram_username: '', telegram_name: '', saving: false, error: '' });
    const otpModal  = reactive({ open: false, code: '', expires_at: null, loading: false, error: '', copied: false });
    const loading   = ref({ skills: false, activity: false, otp: false });
    const tab       = ref('overview');

    const roleBadge = (r) => ({ admin: 'bg-red-900/40 text-red-300 border-red-800', team_lead: 'bg-yellow-900/40 text-yellow-300 border-yellow-800', agent: 'bg-gray-700 text-gray-300 border-gray-600' }[r] || 'bg-gray-700 text-gray-300');
    const srcBadge  = (s) => ({ department: 'bg-indigo-900/40 text-indigo-300', role: 'bg-blue-900/40 text-blue-300', override: 'bg-orange-900/40 text-orange-300' }[s] || 'bg-gray-700 text-gray-400');
    const otpBadge  = (s) => ({ pending:'bg-yellow-500/20 text-yellow-300 border-yellow-700', completed:'bg-green-500/20 text-green-300 border-green-700', expired:'bg-gray-700 text-gray-400 border-gray-600', denied:'bg-red-500/20 text-red-300 border-red-700' }[s] || 'bg-gray-700 text-gray-400 border-gray-600');

    const initials = computed(() => {
      if (!account.value) return '?';
      return (account.value.name || '?').split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    });

    async function loadSkills() {
      if (!account.value || loading.value.skills) return;
      loading.value.skills = true;
      try {
        const d = await fetch(`/api/skills/resolve/account/${account.value.id}`).then(r => r.json());
        skills.value = d.skills || [];
      } catch {} finally { loading.value.skills = false; }
    }

    async function loadActivity() {
      if (!account.value || loading.value.activity) return;
      loading.value.activity = true;
      try {
        const d = await fetch(`/api/accounts/${account.value.id}/activity`).then(r => r.json());
        activity.value = d;
      } catch {} finally { loading.value.activity = false; }
    }

    async function loadOtp() {
      if (!binding.value || loading.value.otp) return;
      loading.value.otp = true;
      try {
        const d = await fetch('/api/otp-status').then(r => r.json());
        otpHistory.value = (Array.isArray(d) ? d : []).filter(o => o.telegram_id === binding.value.telegram_id);
      } catch {} finally { loading.value.otp = false; }
    }

    async function manualBind() {
      bindForm.saving = true; bindForm.error = '';
      try {
        const d = await fetch(`/api/accounts/${account.value.id}/bind`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id: bindForm.telegram_id, telegram_username: bindForm.telegram_username, telegram_name: bindForm.telegram_name }),
        }).then(r => r.json());
        if (!d.ok) { bindForm.error = d.error || 'Failed'; }
        else { bindForm.open = false; bindForm.telegram_id = ''; bindForm.telegram_username = ''; bindForm.telegram_name = ''; }
      } catch(e) { bindForm.error = e.message; }
      bindForm.saving = false;
    }

    async function removeBind() {
      if (!confirm('Remove Telegram binding for this account?')) return;
      await fetch(`/api/accounts/${account.value.id}/bind`, { method: 'DELETE' });
    }

    async function getOtp() {
      otpModal.open = true; otpModal.code = ''; otpModal.error = ''; otpModal.loading = true; otpModal.copied = false;
      try {
        let d = await fetch(`/api/accounts/${account.value.id}/otp`).then(r => r.json());
        if (!d.found) d = await fetch(`/api/accounts/${account.value.id}/generate-otp`, { method: 'POST' }).then(r => r.json());
        if (d.found && d.otp_code) {
          otpModal.code = d.otp_code; otpModal.expires_at = d.expires_at;
          try { await navigator.clipboard.writeText(d.otp_code); otpModal.copied = true; } catch {}
        } else { otpModal.error = d.error || 'OTP not available'; }
      } catch(err) { otpModal.error = err.message; }
      otpModal.loading = false;
    }

    function expiresIn(ts) {
      if (!ts) return '?';
      const diff = Math.round((new Date(ts) - Date.now()) / 1000);
      if (diff <= 0) return 'expired';
      const m = Math.floor(diff / 60), s = diff % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    // Load data lazily on tab change
    watch(tab, (t) => {
      if (t === 'skills') loadSkills();
      if (t === 'activity') loadActivity();
      if (t === 'bindings') loadOtp();
    });

    // Reload when navigating to a different account
    watch(id, () => { skills.value = []; otpHistory.value = []; activity.value = null; });

    onMounted(() => { /* account + binding come from WS state — no fetch needed */ });

    return { account, skills, binding, otpHistory, activity, loading, tab, router, initials,
             roleBadge, srcBadge, otpBadge, fmtDate, fmtRel,
             bindForm, manualBind, removeBind, otpModal, getOtp, expiresIn };
  },

const Skills = {
  setup() {
    const { ref, reactive, computed, onMounted, watch } = Vue;

    const skills = computed(() => state.skills);
    const allAgents = ref([]);

    // ── Drawer state ──────────────────────────────────────────────────────────
    const drawer = reactive({
      open: false,
      tab: 'details',   // 'details' | 'agents' | 'test' | 'callbacks'
      skill: null,       // full details object
      saving: false,
      saveError: null,
      // Details form
      form: { name:'', slug:'', description:'', category:'', api_endpoint:'', api_method:'POST', instructions:'' },
      // Agents tab
      agentsLoading: false,
      assignedAgentIds: new Set(),
      togglingAgent: null,
      // Test tab
      testParams: '{}',
      testing: false,
      testResult: null,
    });

    // ── Callback state ────────────────────────────────────────────────────────
    const cbList = ref([]);
    const cbLoading = ref(false);
    const cbNewUrl = ref('');
    const cbNewMethod = ref('POST');
    const cbSaving = ref(false);
    const cbError = ref(null);

    // ── Create sheet state ────────────────────────────────────────────────────
    const createSheet = reactive({
      open: false,
      saving: false,
      saveError: null,
      form: { name:'', slug:'', description:'', category:'', api_endpoint:'', api_method:'POST', instructions:'', callback_url:'' },
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    async function refreshSkills() {
      try {
        const r = await fetch('/api/skills');
        state.skills = await r.json();
      } catch {}
    }

    onMounted(async () => {
      try {
        const r = await fetch('/api/agents');
        allAgents.value = await r.json();
      } catch {}
    });

    // ── Active toggle (inline) ────────────────────────────────────────────────
    async function toggleActive(skill) {
      const next = !skill.is_active;
      try {
        await fetch(`/api/skills/${skill.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_active: next }),
        });
        skill.is_active = next;
      } catch {}
    }

    // ── Delete ────────────────────────────────────────────────────────────────
    async function deleteSkill(skill) {
      if (!confirm(`Delete skill "${skill.name}"? This is permanent.`)) return;
      await fetch(`/api/skills/${skill.id}?hard=true`, { method: 'DELETE' });
      await refreshSkills();
    }

    // ── Open edit drawer ──────────────────────────────────────────────────────
    async function openEdit(skill) {
      const r = await fetch(`/api/skills/${skill.id}/details`);
      const details = await r.json();
      drawer.skill = { ...skill, ...details };
      drawer.form = {
        name: details.name || skill.name || '',
        slug: details.slug || skill.slug || '',
        description: details.description || skill.description || '',
        category: details.category || skill.category || '',
        api_endpoint: details.api_endpoint || skill.api_endpoint || '',
        api_method: details.api_method || skill.api_method || 'POST',
        instructions: details.instructions || skill.instructions || '',
      };
      // Test params
      let defaultParams = {};
      if (details.request_schema) {
        try {
          const schema = typeof details.request_schema === 'string' ? JSON.parse(details.request_schema) : details.request_schema;
          Object.keys(schema).forEach(k => defaultParams[k] = '');
        } catch {}
      }
      drawer.testParams = JSON.stringify(defaultParams, null, 2) || '{}';
      drawer.testResult = null;
      drawer.testing = false;
      drawer.saveError = null;
      drawer.tab = 'details';
      drawer.open = true;
      // Pre-load agents tab
      loadAssignedAgents(details);
    }

    function loadAssignedAgents(details) {
      const assigned = (details.agents || []).filter(a => a.enabled !== false).map(a => a.id);
      drawer.assignedAgentIds = new Set(assigned);
    }

    function closeDrawer() {
      drawer.open = false;
      drawer.skill = null;
    }

    // ── Save details ──────────────────────────────────────────────────────────
    async function saveDetails() {
      if (!drawer.skill) return;
      drawer.saving = true;
      drawer.saveError = null;
      try {
        const r = await fetch(`/api/skills/${drawer.skill.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(drawer.form),
        });
        if (!r.ok) throw new Error(await r.text());
        await refreshSkills();
        drawer.saveError = null;
      } catch (e) {
        drawer.saveError = e.message;
      }
      drawer.saving = false;
    }

    // ── Agent assign/unassign ─────────────────────────────────────────────────
    async function toggleAgentAssign(agent) {
      if (!drawer.skill) return;
      drawer.togglingAgent = agent.id;
      const isAssigned = drawer.assignedAgentIds.has(agent.id);
      try {
        if (isAssigned) {
          await fetch(`/api/skills/${drawer.skill.id}/assign/${agent.id}`, { method: 'DELETE' });
          drawer.assignedAgentIds.delete(agent.id);
          // trigger reactivity
          drawer.assignedAgentIds = new Set(drawer.assignedAgentIds);
        } else {
          await fetch(`/api/skills/${drawer.skill.id}/assign`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent_id: agent.id, enabled: true }),
          });
          drawer.assignedAgentIds.add(agent.id);
          drawer.assignedAgentIds = new Set(drawer.assignedAgentIds);
        }
      } catch {}
      drawer.togglingAgent = null;
    }

    // ── Test skill ────────────────────────────────────────────────────────────
    async function testSkill() {
      if (!drawer.skill) return;
      drawer.testing = true;
      drawer.testResult = null;
      try {
        let params = {};
        try { params = JSON.parse(drawer.testParams || '{}'); } catch {}
        const r = await fetch(`/api/skills/${drawer.skill.id}/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ params }),
        });
        drawer.testResult = await r.json();
      } catch (e) {
        drawer.testResult = { success: false, error: e.message };
      }
      drawer.testing = false;
    }

    // ── Callbacks ─────────────────────────────────────────────────────────────
    async function loadCallbacks() {
      if (!drawer.skill) return;
      cbLoading.value = true;
      try {
        const r = await fetch(`/api/skills/${drawer.skill.id}/callbacks`);
        cbList.value = await r.json();
      } catch { cbList.value = []; }
      cbLoading.value = false;
    }

    async function addCallback() {
      if (!drawer.skill || !cbNewUrl.value) return;
      cbSaving.value = true;
      cbError.value = null;
      try {
        const r = await fetch(`/api/skills/${drawer.skill.id}/callbacks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: cbNewUrl.value, method: cbNewMethod.value, name: 'default' }),
        });
        if (!r.ok) throw new Error(await r.text());
        cbNewUrl.value = '';
        cbNewMethod.value = 'POST';
        await loadCallbacks();
      } catch (e) { cbError.value = e.message; }
      cbSaving.value = false;
    }

    async function deleteCallback(cbId) {
      if (!confirm('Delete this callback? This is permanent.')) return;
      try {
        await fetch(`/api/skills/callbacks/${cbId}`, { method: 'DELETE' });
        await loadCallbacks();
      } catch {}
    }

    watch(() => drawer.tab, (tab) => {
      if (tab === 'callbacks' && drawer.skill) loadCallbacks();
    });

    // ── Create skill ──────────────────────────────────────────────────────────
    function openCreate() {
      createSheet.form = { name:'', slug:'', description:'', category:'', api_endpoint:'', api_method:'POST', instructions:'', callback_url:'' };
      createSheet.saveError = null;
      createSheet.open = true;
    }

    function closeCreate() { createSheet.open = false; }

    async function submitCreate() {
      createSheet.saving = true;
      createSheet.saveError = null;
      try {
        const r = await fetch('/api/skills', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(createSheet.form),
        });
        if (!r.ok) throw new Error(await r.text());
        // Create default callback if URL provided
        if (createSheet.form.callback_url && data.id) {
          await fetch(`/api/skills/${data.id}/callbacks`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ endpoint: createSheet.form.callback_url, method: createSheet.form.api_method || 'POST', name: 'default' }),
          });
        }
        createSheet.open = false;
        await refreshSkills();
      } catch (e) {
        createSheet.saveError = e.message;
      }
      createSheet.saving = false;
    }

    const inputCls = 'w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 transition-colors';

    return {
      skills, allAgents, drawer, createSheet,
      cbList, cbLoading, cbNewUrl, cbNewMethod, cbSaving, cbError,
      toggleActive, deleteSkill, openEdit, closeDrawer,
      saveDetails, toggleAgentAssign, testSkill,
      loadCallbacks, addCallback, deleteCallback,
      openCreate, closeCreate, submitCreate, inputCls,
    };
  },

const Orchestrate = {
  setup() {
    const form = reactive({
      userId: '', agentName: 'sales', chatType: 'dm',
      groupChatId: '', message: '',
    });
    const result = ref(null);
    const sending = ref(false);
    const groupChats = ref([]);
    const recentSends = ref([]);

    onMounted(async () => {
      try {
        const r = await fetch('/api/group-chats');
        groupChats.value = await r.json();
      } catch {}
    });

    async function send() {
      if (!form.userId || !form.message.trim() || sending.value) return;
      sending.value = true;
      result.value = null;
      try {
        const r = await fetch('/api/orchestrate/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_telegram_id: form.userId,
            agent_name: form.agentName,
            chat_type: form.chatType,
            group_chat_id: form.groupChatId,
            message: form.message,
          }),
        });
        const d = await r.json();
        result.value = d;
        recentSends.value.unshift({ ...form, ts: new Date().toISOString(), reply: d.agent_reply });
        if (recentSends.value.length > 10) recentSends.value.pop();
        form.message = '';
      } catch (e) {
        result.value = { error: e.message };
      }
      sending.value = false;
    }

    return { form, result, sending, groupChats, recentSends, send,
             bindings: computed(() => state.bindings), fmtRel };
  },
  template: `
    <div class="p-6 w-full">
      <h1 class="text-xl font-bold mb-5 text-white">Orchestrate</h1>
      <div class="space-y-4 bg-gray-900 border border-gray-800 rounded-xl p-5">

          <label class="text-xs text-gray-500 block mb-1">Agent</label>

                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">

        </div>

          <label class="text-xs text-gray-500 block mb-1">Chat Type</label>

const Tasks = {
  setup() {
    const activeTab = Vue.ref('all');
    const priorityFilter = Vue.ref('all');
    const showForm = Vue.ref(false);
    const saving = Vue.ref(false);
    const newTask = Vue.reactive({ title: '', description: '', agent_name: '', priority: 'normal', due_at: '', tags: '' });
    const localTasks = Vue.ref([]);

    const TABS = [
      { key: 'all', label: 'All' },
      { key: 'pending', label: 'Pending' },
      { key: 'in_progress', label: 'In Progress' },
      { key: 'blocked', label: 'Blocked' },
      { key: 'done', label: 'Done' },
      { key: 'cancelled', label: 'Cancelled' },
    ];
    const PRIORITIES = ['all', 'urgent', 'high', 'normal', 'low'];

    onMounted(async () => {
      try {
        const r = await fetch('/api/tasks');
        localTasks.value = await r.json();
      } catch {}
    });

    const filtered = Vue.computed(() => {
      let list = localTasks.value;
      if (activeTab.value !== 'all') list = list.filter(t => t.status === activeTab.value);
      if (priorityFilter.value !== 'all') list = list.filter(t => t.priority === priorityFilter.value);
      return list;
    });

    function countFor(key) {
      if (key === 'all') return localTasks.value.length;
      return localTasks.value.filter(t => t.status === key).length;
    }

    const PRIORITY_DOT = {
      urgent: 'bg-red-500',
      high: 'bg-orange-400',
      normal: 'bg-gray-400',
      low: 'bg-gray-600',
    };
    const PRIORITY_LABEL = { urgent: 'Urgent', high: 'High', normal: 'Normal', low: 'Low' };

    function statusBadge(s) {
      return ({
        pending:     'bg-yellow-500/20 text-yellow-300 border border-yellow-700',
        in_progress: 'bg-blue-500/20 text-blue-300 border border-blue-600 animate-pulse',
        blocked:     'bg-red-500/20 text-red-300 border border-red-700',
        done:        'bg-green-500/20 text-green-300 border border-green-700',
        cancelled:   'bg-gray-700/50 text-gray-500 border border-gray-700 line-through',
      })[s] || 'bg-gray-700 text-gray-400';
    }

    function dueClass(due_at, status) {
      if (!due_at || status === 'done' || status === 'cancelled') return 'text-gray-500';
      const d = new Date(due_at);
      const now = new Date();
      if (d < now) return 'text-red-400 font-semibold';
      const today = new Date(); today.setHours(23,59,59,999);
      if (d <= today) return 'text-yellow-400';
      return 'text-gray-400';
    }

    function fmtDue(due_at) {
      if (!due_at) return '—';
      const d = new Date(due_at);
      const diff = d.getTime() - Date.now();
      if (diff < 0) return 'overdue ' + fmtRel(due_at);
      if (diff < 86400000) return 'today';
      if (diff < 172800000) return 'tomorrow';
      return d.toLocaleDateString();
    }

    async function changeStatus(task, status) {
      try {
        await fetch(`/api/tasks/${task.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
        task.status = status;
      } catch {}
    }

    async function deleteTask(task) {
      try {
        await fetch(`/api/tasks/${task.id}`, { method: 'DELETE' });
        localTasks.value = localTasks.value.filter(t => t.id !== task.id);
      } catch {}
    }

    async function submitTask() {
      if (!newTask.title.trim() || saving.value) return;
      saving.value = true;
      try {
        const r = await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...newTask }),
        });
        const d = await r.json();
        if (d.id) {
          const refetch = await fetch('/api/tasks');
          localTasks.value = await refetch.json();
          Object.assign(newTask, { title: '', description: '', agent_name: '', priority: 'normal', due_at: '', tags: '' });
          showForm.value = false;
        }
      } catch {}
      saving.value = false;
    }

    return {
      activeTab, priorityFilter, showForm, saving, newTask,
      TABS, PRIORITIES, filtered, countFor,
      PRIORITY_DOT, PRIORITY_LABEL,
      statusBadge, dueClass, fmtDue, changeStatus, deleteTask, submitTask,
      truncate,
    };
  },
  template: `
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-bold text-white">Tasks</h1>
        <button @click="showForm = !showForm"
                class="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white transition-colors">
          + New Task
        </button>
      </div>

      <!-- New task form -->
      <div v-if="showForm" class="mb-5 bg-gray-900 border border-gray-700 rounded-xl p-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500 block mb-1">Title <span class="text-red-400">*</span></label>
            <input v-model="newTask.title" placeholder="Task title…"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Assign to Agent</label>
            <select v-model="newTask.agent_name"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">
              <option value="">None</option>
              <option value="Sales">Sales</option>
              <option value="Support">Support</option>
              <option value="Manager">Manager</option>
              <option value="Dev">Dev</option>
              <option value="IT">IT</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Description</label>
          <textarea v-model="newTask.description" rows="2" placeholder="Optional description…"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 resize-y"></textarea>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="text-xs text-gray-500 block mb-1">Priority</label>
            <select v-model="newTask.priority"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="normal">Normal</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Due Date</label>
            <input v-model="newTask.due_at" type="datetime-local"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Tags (comma-separated)</label>
            <input v-model="newTask.tags" placeholder="crm, follow-up…"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500" />
          </div>
        </div>
        <div class="flex gap-2">
          <button @click="submitTask" :disabled="!newTask.title.trim() || saving"

            {{ saving ? 'Creating…' : 'Create Task' }}
          </button>
          <button @click="showForm = false"
                  class="text-xs px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors">
            Cancel
          </button>
        </div>
      </div>

      <!-- Status tabs -->
      <div class="flex gap-1 mb-3 border-b border-gray-800">
        <button v-for="tab in TABS" :key="tab.key"
          @click="activeTab = tab.key"
          :class="activeTab === tab.key
            ? 'text-white border-b-2 border-blue-500'
            : 'text-gray-500 hover:text-gray-300 border-b-2 border-transparent'"

          {{ tab.label }}
          <span v-if="countFor(tab.key)" :class="activeTab === tab.key ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-400'"
            class="px-1.5 py-0.5 rounded-full text-xs leading-none">{{ countFor(tab.key) }}</span>
        </button>
      </div>

      <!-- Priority filter -->
      <div class="flex gap-2 mb-4">
        <button v-for="p in PRIORITIES" :key="p"
          @click="priorityFilter = p"
          :class="priorityFilter === p ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
          class="text-xs px-3 py-1 rounded-full border border-gray-700 transition-colors capitalize">
          {{ p === 'all' ? 'All Priorities' : p }}
        </button>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">

          <thead>

          </thead>
          <tbody>
            <tr v-for="t in filtered" :key="t.id" class="border-b border-gray-800/50 hover:bg-gray-800/30">
              <td class="py-2 pr-3">

                    <option value="done">done</option>
                    <option value="cancelled">cancelled</option>
                  </select>

              </td>

// ─── Knowledge ───────────────────────────────────────────────────────────────
const Knowledge = {
  setup() {
    const items = ref([]);
    const loading = ref(false);
    const filter = ref('all');
    const resyncingIds = ref(new Set());
    const bulkDrawer = reactive({
      open: false, total: 0, current: 0,
      currentItem: null, log: [], done: false, success: 0, failed: 0,
    });

    // ── Dedup state ──────────────────────────────────────────────────────────
    const scanning = ref(false);
    const dedupQueue = ref([]);
    const dedupTotal = ref(0);
    const dedupDrawer = ref(false);
    const toast = ref(null);
    let toastTimer = null;

    function showToast(msg) {
      toast.value = msg;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.value = null; }, 4000);
    }

    async function loadDedupQueue() {
      try {
        const r = await fetch('/api/knowledge/dedup-queue');
        const d = await r.json();
        dedupQueue.value = d.queue || [];
        dedupTotal.value = d.total || 0;
      } catch {}
    }

    async function scanDuplicates() {
      scanning.value = true;
      try {
        const r = await fetch('/api/knowledge/dedup-scan', { method: 'POST' });
        const d = await r.json();
        await loadDedupQueue();
        const autoMerged = d.auto_merged ?? d.merged ?? 0;
        const queued = dedupTotal.value;
        showToast(`Auto-merged ${autoMerged} · ${queued} queued for review`);
        if (queued > 0) dedupDrawer.value = true;
      } catch (err) {
        showToast('Scan failed: ' + err.message);
      }
      scanning.value = false;
    }

    async function mergeItem(item, winnerId) {
      try {
        await fetch('/api/knowledge/dedup-merge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ queue_id: item.id, winner_id: winnerId }),
        });
        dedupQueue.value = dedupQueue.value.filter(q => q.id !== item.id);
        dedupTotal.value = dedupQueue.value.length;
      } catch {}
    }

    async function skipItem(item) {
      try {
        await fetch('/api/knowledge/dedup-skip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ queue_id: item.id }),
        });
        dedupQueue.value = dedupQueue.value.filter(q => q.id !== item.id);
        dedupTotal.value = dedupQueue.value.length;
      } catch {}
    }

    async function mergeAll() {
      const items = [...dedupQueue.value];
      for (const item of items) {
        const salA = parseFloat(item.sal_a ?? item.salience_a ?? 0);
        const salB = parseFloat(item.sal_b ?? item.salience_b ?? 0);
        const winnerId = salA >= salB ? (item.id_a || item.memory_id_a) : (item.id_b || item.memory_id_b);
        await mergeItem(item, winnerId);
      }
    }

    const FILTERS = [
      { key: 'all', label: 'All' },
      { key: 'synced', label: 'Synced' },
      { key: 'unsynced', label: 'Unsynced' },
      { key: 'duplicates', label: 'Has Duplicates' },
    ];

    async function loadKnowledge() {
      loading.value = true;
      try {
        const r = await fetch('/api/knowledge');
        items.value = await r.json();
      } catch {}
      loading.value = false;
    }

    onMounted(() => { loadKnowledge(); loadDedupQueue(); });

    const search = ref('');
    const filtered = computed(() => {
      let list = items.value;
      if (filter.value === 'synced') list = list.filter(m => parseInt(m.embedding_count) > 0);
      else if (filter.value === 'unsynced') list = list.filter(m => parseInt(m.embedding_count) === 0);
      else if (filter.value === 'duplicates') list = list.filter(m => parseInt(m.duplicate_count) > 0);
      if (search.value.trim()) {
        const q = search.value.toLowerCase();
        list = list.filter(m => (m.domain || '').toLowerCase().includes(q) || (m.content || '').toLowerCase().includes(q));
      }
      return list;
    });

    const unsyncedCount = computed(() => items.value.filter(m => parseInt(m.embedding_count) === 0).length);

    function fmtBytes(n) {
      const v = parseInt(n) || 0;
      if (v < 1024) return v + ' B';
      if (v < 1048576) return (v / 1024).toFixed(1) + ' KB';
      return (v / 1048576).toFixed(1) + ' MB';
    }

    async function resyncOne(item) {
      resyncingIds.value = new Set([...resyncingIds.value, item.id]);
      try {
        await fetch(`/api/knowledge/${item.id}/resync`, { method: 'POST' });
        const r = await fetch('/api/knowledge');
        items.value = await r.json();
      } catch {}
      resyncingIds.value = new Set([...resyncingIds.value].filter(id => id !== item.id));
    }

    async function bulkResync() {
      Object.assign(bulkDrawer, { open: true, total: 0, current: 0, currentItem: null, log: [], done: false, success: 0, failed: 0 });
      try {
        const response = await fetch('/api/knowledge/bulk-resync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: [] }),
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const msg = JSON.parse(line.slice(6));
              if (msg.type === 'start') {
                bulkDrawer.total = msg.total;
              } else if (msg.type === 'progress') {
                bulkDrawer.current = msg.current;
                bulkDrawer.currentItem = msg;
                bulkDrawer.log.unshift(msg);
                if (bulkDrawer.log.length > 10) bulkDrawer.log.pop();
              } else if (msg.type === 'done') {
                bulkDrawer.done = true;
                bulkDrawer.success = msg.success;
                bulkDrawer.failed = msg.failed;
                loadKnowledge();
              }
            } catch {}
          }
        }
      } catch {
        bulkDrawer.done = true;
      }
    }

    return {
      items, loading, filter, FILTERS, filtered, unsyncedCount, search,
      resyncingIds, bulkDrawer,
      loadKnowledge, resyncOne, bulkResync,
      fmtBytes, fmtRel, truncate,
      scanning, dedupQueue, dedupTotal, dedupDrawer, toast,
      scanDuplicates, mergeItem, skipItem, mergeAll,
    };

// ─── Dashboard ────────────────────────────────────────────────────────────────
const Dashboard = {
  setup() {
    const router = VueRouter.useRouter();

    const totalConversations = computed(() => state.conversations.length);
    const activeHandoffs     = computed(() => state.handoffs.filter(h => h.status === 'pending').length);
    const memoriesStored     = computed(() => state.memories.length);
    const pairedUsers        = computed(() => state.bindings.length);

    const instanceCards = computed(() => state.instances.map(i => ({ ...i, isProxy: false })));
    const proxyCard     = computed(() => state.proxy ? { ...state.proxy, name: 'proxy', port: 20000, isProxy: true } : null);

    function lastActivityForAgent(name) {
      const convs = state.conversations.filter(c => (c.agent_name || '').toLowerCase() === name.toLowerCase());
      if (!convs.length) return null;
      return [...convs].sort((a, b) => new Date(b.last_message_at || 0) - new Date(a.last_message_at || 0))[0]?.last_message_at || null;
    }

    const recentHandoffs = computed(() =>
      [...state.handoffs].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 5)
    );
    const recentMemories = computed(() =>
      [...state.memories].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 5)
    );

    // Memory type counts from memStats (full DB totals, not just recent 10)
    const memoryTypeCounts = computed(() => {
      const counts = { episodic: 0, long_term: 0, knowledge: 0 };
      memStats.value.byType.forEach(r => {
        const t = (r.memory_type || '').toLowerCase();
        if (t === 'episodic') counts.episodic = parseInt(r.count);
        else if (t === 'long_term') counts.long_term = parseInt(r.count);
        else if (t === 'knowledge') counts.knowledge = parseInt(r.count);
      });
      return counts;
    });
    const totalMemoryTypes = computed(() => memStats.value.total || 1);
    function memTypeWidth(count) {
      return Math.round((count / totalMemoryTypes.value) * 100);
    }
    const seededCount = computed(() => memoryTypeCounts.value.knowledge);
    const lastChunkerRun = computed(() => {
      if (!state.memories.length) return null;
      return [...state.memories].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))[0]?.created_at || null;
    });

    const AGENT_COLORS = { sales: '#3b82f6', support: '#8b5cf6', manager: '#10b981' };
    function agentColor(name) { return AGENT_COLORS[(name || '').toLowerCase().split(' ')[0]] || '#6b7280'; }
    function agentInitials(name) { return name ? name.slice(0, 2).toUpperCase() : '?'; }

    function handoffBadge(status) {
      return ({ pending: 'bg-yellow-500/20 text-yellow-300 border border-yellow-700',
                accepted: 'bg-green-500/20 text-green-300 border border-green-700',
                completed: 'bg-blue-500/20 text-blue-300 border border-blue-700',
                rejected: 'bg-red-500/20 text-red-300 border border-red-700' })[status] || 'bg-gray-700 text-gray-400';
    }

    const MEM_TYPE_COLORS = { knowledge: '#a855f7', long_term: '#3b82f6', episodic: '#22c55e', short_term: '#eab308', shared: '#f97316' };
    async function loadMemStats() {

    }

    const syncing = ref(false);

      syncing.value = true; syncMsg.value = '';

// ─── Settings ─────────────────────────────────────────────────────────────────
const Settings = {
  setup() {
    const { ref, reactive, onMounted } = Vue;
    const tab = ref('protocol');

    // Global Protocol tab
    const globalPrompt = ref('');
    const promptSaving = ref(false);
    const promptSaved = ref(false);
    const promptError = ref('');

    // Global Behaviors tab
    const globalSkillMap = ref('{}');
    const globalBehaviors = ref('{}');
    const behaviorsSaving = ref(false);
    const behaviorsSaved = ref(false);
    const behaviorsError = ref('');

    // Provider Defaults tab
    const providerForm = reactive({ provider: 'anthropic', model: 'claude-haiku-4-5', api_key: '', base_url: '' });
    const applyingSaving = ref(false);
    const applyingResult = ref('');

    // Fleet Overview tab
    const fleetAgents = ref([]);

    async function loadSettings() {
      try {
        const r = await fetch('/api/settings');
        const d = await r.json();
        globalPrompt.value = d.global_prompt || '';
        globalSkillMap.value = typeof d.global_skill_map === 'string'
          ? d.global_skill_map
          : JSON.stringify(d.global_skill_map || {}, null, 2);
        globalBehaviors.value = typeof d.global_behaviors === 'string'
          ? d.global_behaviors
          : JSON.stringify(d.global_behaviors || {}, null, 2);
        fleetAgents.value = d.agents || [];
      } catch {}
    }

    async function saveGlobalPrompt() {
      promptSaving.value = true; promptError.value = '';
      try {
        const r = await fetch('/api/settings/global-prompt', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system_prompt: globalPrompt.value }),
        });
        const d = await r.json();
        if (!d.ok) { promptError.value = d.error || 'Failed'; }
        else { promptSaved.value = true; setTimeout(() => { promptSaved.value = false; }, 3000); }
      } catch (e) { promptError.value = e.message; }
      promptSaving.value = false;
    }

    async function saveGlobalBehaviors() {
      behaviorsSaving.value = true; behaviorsError.value = '';
      let skill_map, behaviors;
      try { skill_map = JSON.parse(globalSkillMap.value); } catch { behaviorsError.value = 'Invalid Skill Map JSON'; behaviorsSaving.value = false; return; }
      try { behaviors = JSON.parse(globalBehaviors.value); } catch { behaviorsError.value = 'Invalid Behaviors JSON'; behaviorsSaving.value = false; return; }
      try {
        const r = await fetch('/api/settings/global-behaviors', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skill_map, behaviors }),
        });
        const d = await r.json();
        if (!d.ok) { behaviorsError.value = d.error || 'Failed'; }
        else { behaviorsSaved.value = true; setTimeout(() => { behaviorsSaved.value = false; }, 3000); }
      } catch (e) { behaviorsError.value = e.message; }
      behaviorsSaving.value = false;
    }

    async function applyToAllAgents() {
      applyingSaving.value = true; applyingResult.value = '';
      const slugs = fleetAgents.value.map(a => a.slug).filter(Boolean);
      let ok = 0, fail = 0;
      for (const slug of slugs) {
        try {
          const r = await fetch(`/api/agents/${slug}/provider`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              provider: providerForm.provider,
              model: providerForm.model,
              api_key: providerForm.api_key || undefined,
              base_url: providerForm.base_url || undefined,
            }),
          });
          const d = await r.json();
          if (d.ok) ok++; else fail++;
        } catch { fail++; }
      }
      applyingResult.value = `Applied to ${ok} agent(s)${fail ? `, ${fail} failed` : ''}.`;
      applyingSaving.value = false;
    }

    onMounted(loadSettings);

    return { tab, globalPrompt, promptSaving, promptSaved, promptError, saveGlobalPrompt,
             globalSkillMap, globalBehaviors, behaviorsSaving, behaviorsSaved, behaviorsError, saveGlobalBehaviors,
             providerForm, applyingSaving, applyingResult, applyToAllAgents,
             fleetAgents, fmtDate, PROVIDER_MODELS };
  },
  template: `

      <!-- Tabs -->
      <div class="flex gap-1 mb-6 border-b border-gray-800">
        <button v-for="t in [{id:'protocol',label:'Global Protocol'},{id:'provider',label:'Provider Defaults'},{id:'fleet',label:'Fleet Overview'}]"
                :key="t.id" @click="tab = t.id"
                :class="tab===t.id ? 'text-white border-b-2 border-blue-500' : 'text-gray-500 hover:text-gray-300'"
                class="px-4 py-2 text-xs font-medium transition-colors -mb-px">
          {{ t.label }}
        </button>
      </div>

      <!-- Global Protocol Tab -->
      <div v-if="tab==='protocol'" class="space-y-6">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <div class="flex items-center justify-between mb-3">
            <label class="text-sm font-semibold text-gray-300">Global System Prompt</label>
            <div class="flex items-center gap-3">
              <span v-if="promptSaved" class="text-green-400 text-xs">✅ Saved</span>
              <span v-if="promptError" class="text-red-400 text-xs">❌ {{ promptError }}</span>
              <button @click="saveGlobalPrompt" :disabled="promptSaving"
                class="px-4 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white text-xs font-medium transition-colors">
                {{ promptSaving ? 'Saving…' : 'Save Prompt' }}
              </button>

          </div>
          <textarea v-model="globalPrompt" rows="14"

    const error = ref('');
    const globalPrompt = ref('');
    const showGlobalPrompt = ref(false);
    const agent = ref(null);
    const tab = ref('instructions');

    const provSaving = ref(false);
    const provSaved = ref(false);
    const provError = ref('');

      loading.value = true; error.value = '';
      try {
        const r = await fetch(`/api/agents/${slug.value}`);
        if (!r.ok) { error.value = 'Agent not found'; loading.value = false; return; }
        const d = await r.json();
        agent.value = d;
        draft.system_prompt = d.system_prompt || '';
        globalPrompt.value = d.global_prompt || '';
        draft.skill_map = typeof d.skill_map === 'string' ? d.skill_map : JSON.stringify(d.skill_map || {}, null, 2);
        draft.behaviors = typeof d.behaviors === 'string' ? d.behaviors : JSON.stringify(d.behaviors || {}, null, 2);
        provForm.provider = d.provider || 'anthropic';
        provForm.model = d.model || 'claude-haiku-4-5';
      } catch (e) { error.value = e.message; }
      loading.value = false;
    }

    async function saveInstructions() {
      instrSaving.value = true; instrError.value = '';
      try {
        const r = await fetch(`/api/agent-configs/${agent.value.id}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system_prompt: draft.system_prompt }),
        });
        const d = await r.json();
        if (d.ok === false) { instrError.value = d.error || 'Failed'; }
        else { instrSaved.value = true; setTimeout(() => { instrSaved.value = false; }, 3000); }
      } catch (e) { instrError.value = e.message; }
      instrSaving.value = false;
    }

    async function saveProvider() {
      provSaving.value = true; provError.value = '';
      try {

          method: 'POST', headers: { 'Content-Type': 'application/json' },

            provider: provForm.provider, model: provForm.model,
            api_key: provForm.api_key || undefined,
            base_url: provForm.base_url || undefined,
          }),
        });
        const d = await r.json();
        if (!d.ok) { provError.value = d.error || 'Failed'; }
        else { provSaved.value = true; setTimeout(() => { provSaved.value = false; }, 3000); }
      } catch (e) { provError.value = e.message; }
      provSaving.value = false;
    }

    onMounted(loadAgent);
    watch(slug, loadAgent);
    return { loading, error, agent, tab, draft, instrSaving, instrSaved, instrError, provForm, provSaving, provSaved, provError, saveInstructions, saveProvider, globalPrompt, showGlobalPrompt, fmtDate, highlightJson, PROVIDER_MODELS, modelLabel, modelBadgeClass, router, slug };
