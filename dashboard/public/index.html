                  <div class="text-white font-semibold text-sm">Restart All Agents</div>
                  <div class="text-gray-500 text-xs">
                    <span v-if="restartAllDrawer.running">{{ restartAllDrawer.current }}/{{ restartAllDrawer.total }} agents…</span>
                    <span v-else-if="restartAllDrawer.done">All done ✓</span>
                    <span v-else-if="restartAllDrawer.error">Error</span>
                  </div>
                </div>
              </div>
              <button v-if="!restartAllDrawer.running" @click="restartAllDrawer.open = false"
                class="text-gray-500 hover:text-gray-300 text-xl leading-none">✕</button>
            </div>
            <!-- Progress bar -->
            <div v-if="restartAllDrawer.total" class="w-full bg-gray-800 rounded-full h-1 mb-4">
              <div class="bg-blue-500 h-1 rounded-full transition-all duration-500"
                :style="{ width: (restartAllDrawer.current / restartAllDrawer.total * 100) + '%' }"></div>
            </div>
            <!-- Log lines -->
            <div class="space-y-1.5 max-h-52 overflow-y-auto">
              <div v-for="(entry, i) in restartAllDrawer.logs" :key="i"
                class="flex items-center gap-2 text-xs">
                <span v-if="entry.status === 'done'">✅</span>
                <span v-else-if="entry.status === 'warn'">⚠️</span>
                <span v-else-if="entry.status === 'skip'">⏩</span>
                <span v-else-if="entry.status === 'stopping' || entry.status === 'starting'" class="inline-block animate-spin">⏳</span>
                <span v-else class="text-blue-400">•</span>
                <span :class="entry.status === 'done' ? 'text-gray-300' : entry.status === 'warn' ? 'text-amber-400' : entry.status === 'skip' ? 'text-gray-600' : 'text-gray-400'">{{ entry.text }}</span>
              </div>
            </div>
            <!-- Error -->
            <div v-if="restartAllDrawer.error" class="text-red-400 text-xs mt-3">❌ {{ restartAllDrawer.error }}</div>
            <!-- Done -->
            <div v-if="restartAllDrawer.done" class="flex items-center justify-between mt-4">
              <span class="text-green-400 text-xs font-medium">✅ All agents restarted</span>
              <button @click="restartAllDrawer.open = false"
                class="px-4 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs transition-colors">Close</button>
            </div>
          </div>
        </div>
      </transition>
    </Teleport>

    <!-- ── Agent Action Bottom Drawer ───────────────────────────────────────── -->
    <Teleport to="body">
      <transition name="slide-up">
        <div v-if="agentActionDrawer.open" class="fixed inset-0 z-[60] flex items-end">
          <div class="absolute inset-0 bg-black/60" @click="!agentActionDrawer.confirmed && (agentActionDrawer.open = false)"></div>
          <div class="relative z-10 w-full max-w-lg mx-auto bg-gray-950 border border-gray-800 rounded-t-2xl shadow-2xl p-6 pb-8">
            <!-- Header -->
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2">
                <span class="text-lg">{{ agentActionDrawer.action === 'start' ? '🟢' : agentActionDrawer.action === 'stop' ? '🛑' : '🔄' }}</span>
                <div>
                  <div class="text-white font-semibold text-sm">
                    {{ agentActionDrawer.action === 'start' ? 'Start' : agentActionDrawer.action === 'stop' ? 'Stop' : 'Restart' }} Agent
                  </div>
                  <div class="text-gray-500 text-xs font-mono">{{ agentActionDrawer.agent?.displayName }} :{{ agentActionDrawer.agent?.port }}</div>
                </div>
              </div>
              <button v-if="!agentActionDrawer.confirmed || agentActionDrawer.done || agentActionDrawer.error"
                @click="agentActionDrawer.open = false"
                class="text-gray-500 hover:text-gray-300 text-xl leading-none">✕</button>
            </div>

            <!-- Confirm state -->
            <div v-if="!agentActionDrawer.confirmed" class="space-y-4">
              <p class="text-gray-300 text-sm">
                <span v-if="agentActionDrawer.action === 'stop'">
                  This will kill <span class="text-white font-medium">{{ agentActionDrawer.agent?.displayName }}</span>. Active conversations will be dropped.
                </span>
                <span v-else-if="agentActionDrawer.action === 'start'">
                  Start <span class="text-white font-medium">{{ agentActionDrawer.agent?.displayName }}</span> on port {{ agentActionDrawer.agent?.port }}.
                </span>
                <span v-else>
                  This will restart <span class="text-white font-medium">{{ agentActionDrawer.agent?.displayName }}</span>. It will be briefly unavailable.
                </span>
              </p>
              <div class="flex gap-3">
                <button @click="confirmAgentAction"
                  :class="agentActionDrawer.action === 'stop' ? 'bg-red-600 hover:bg-red-500' : 'bg-green-700 hover:bg-green-600'"
                  class="flex-1 py-2 rounded-lg text-white text-sm font-medium transition-colors">
                  Yes, {{ agentActionDrawer.action === 'start' ? 'Start' : agentActionDrawer.action === 'stop' ? 'Stop' : 'Restart' }}
                </button>
                <button @click="agentActionDrawer.open = false"
                  class="flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-medium transition-colors">
                  Cancel
                </button>
              </div>
            </div>

            <!-- Progress state -->
            <div v-else class="space-y-3">
              <div v-for="s in agentActionDrawer.steps" :key="s.step" class="flex items-center gap-3">
                <span class="text-base">
                  <span v-if="s.status === 'done'">✅</span>
                  <span v-else-if="s.status === 'warn'">⚠️</span>
                  <span v-else-if="s.status === 'running'" class="inline-block animate-spin">⏳</span>
                  <span v-else>⬜</span>
                </span>
                <span class="text-sm" :class="s.status === 'done' ? 'text-gray-300' : s.status === 'warn' ? 'text-amber-400' : 'text-white'">{{ s.label }}</span>
              </div>
              <!-- Progress bar -->
              <div v-if="!agentActionDrawer.done && !agentActionDrawer.error" class="w-full bg-gray-800 rounded-full h-1.5 mt-2">
                <div class="bg-blue-500 h-1.5 rounded-full transition-all duration-500"
                  :style="{ width: (agentActionDrawer.currentStep / agentActionDrawer.totalSteps * 100) + '%' }"></div>
              </div>
              <!-- Error -->
              <div v-if="agentActionDrawer.error" class="text-red-400 text-sm mt-2">❌ {{ agentActionDrawer.error }}</div>
              <!-- Done -->
              <div v-if="agentActionDrawer.done" class="flex items-center justify-between mt-2">
                <span class="text-green-400 text-sm font-medium">Done ✓</span>
                <button @click="agentActionDrawer.open = false"
                  class="px-4 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm transition-colors">Close</button>
              </div>
            </div>
          </div>
        </div>
      </transition>
    </Teleport>

    <!-- ── Create Agent Drawer ─────────────────────────────────────────────── -->
    <div v-if="spawnDrawer.open" class="fixed inset-0 z-50 flex justify-end">
      <div class="absolute inset-0 bg-black/50" @click="spawnDrawer.open=false"></div>
      <div class="relative z-10 w-full max-w-lg bg-gray-950 border-l border-gray-800 flex flex-col h-full shadow-2xl">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
          <div><div class="text-white font-semibold">🤖 Create Agent</div><div class="text-gray-500 text-xs mt-0.5">Spawn a new fleet agent</div></div>
          <button @click="spawnDrawer.open=false" class="text-gray-500 hover:text-gray-300 text-xl">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
          <div>
            <label class="text-xs text-gray-500 block mb-1">Agent Name</label>
            <input v-model="spawnForm.name" placeholder="e.g. Fleet-HR" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Slug <span class="text-gray-600">(auto)</span></label>
            <input v-model="spawnForm.slug" placeholder="hr" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-400 font-mono outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Description</label>
            <textarea v-model="spawnForm.description" rows="3" placeholder="What does this agent do? Who does it serve?" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 resize-none"></textarea>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Department</label>
            <select v-model="spawnForm.department" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">
              <option value="general">General</option>
              <option value="sales">Sales</option>
              <option value="support">Support</option>
              <option value="engineering">Engineering</option>
              <option value="hr">HR</option>
              <option value="finance">Finance</option>
              <option value="marketing">Marketing</option>
              <option value="it">IT</option>
              <option value="legal">Legal</option>
              <option value="exec">Executive</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Telegram Bot Token</label>
            <input v-model="spawnForm.bot_token" type="password" placeholder="1234567890:AAF..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 font-mono" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Model</label>
            <select v-model="spawnForm.model" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">
              <option value="claude-haiku-4-5">Claude Haiku (fast, default)</option>
              <option value="claude-sonnet-4-6">Claude Sonnet (smarter)</option>
            </select>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-800 flex items-center justify-between shrink-0">
          <span class="text-gray-600 text-xs">Port auto-assigned from :20060+</span>
          <div class="flex gap-2">
            <button @click="spawnDrawer.open=false" class="px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium">Cancel</button>
            <button @click="doSpawn" :disabled="!spawnForm.name||!spawnForm.description||!spawnForm.bot_token"
              class="px-4 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white text-xs font-medium">
              🚀 Spawn Agent
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Spawn Progress Drawer (bottom) ────────────────────────────────────── -->
    <div v-if="spawnProgress.drawerOpen" class="fixed bottom-0 left-56 right-0 z-50 bg-gray-950 border-t border-gray-800 shadow-2xl">
      <div class="flex items-center justify-between px-6 py-3 border-b border-gray-800">
        <div class="text-sm font-semibold text-white">
          {{ spawnProgress.done ? '✅ Agent Live!' : spawnProgress.error ? '❌ Spawn Failed' : '⚙️ Spawning ' + spawnForm.name + '...' }}
        </div>
        <button @click="spawnProgress.drawerOpen=false" class="text-gray-500 hover:text-gray-300 text-lg">✕</button>
      </div>
      <div class="px-6 py-4">
        <!-- Progress bar -->
        <div class="w-full bg-gray-800 rounded-full h-1.5 mb-4">
          <div class="bg-blue-500 h-1.5 rounded-full transition-all duration-300"
            :style="{width: spawnProgress.totalSteps ? (spawnProgress.currentStep/spawnProgress.totalSteps*100)+'%' : '0%'}"></div>
        </div>
        <!-- Steps -->
        <div class="grid grid-cols-2 gap-1.5 text-xs">
          <div v-for="s in spawnProgress.steps" :key="s.step" class="flex items-center gap-2">
            <span v-if="s.status==='done'" class="text-green-400">✅</span>
            <span v-else-if="s.status==='running'" class="inline-block w-3 h-3 border border-blue-400 border-t-transparent rounded-full animate-spin"></span>
            <span v-else class="text-red-400">❌</span>
            <span :class="s.status==='done'?'text-gray-300':s.status==='running'?'text-blue-300':'text-red-400'">{{ s.label }}</span>
          </div>
        </div>
        <!-- Done / Error state -->
        <div v-if="spawnProgress.done && spawnProgress.result" class="mt-3 p-3 bg-green-900/20 border border-green-800 rounded-lg text-xs text-green-300">
          🎉 <strong>{{ spawnProgress.result.name }}</strong> is live on port <strong>:{{ spawnProgress.result.port }}</strong>
        </div>
        <div v-if="spawnProgress.error" class="mt-3 p-3 bg-red-900/20 border border-red-800 rounded-lg text-xs text-red-300">
          {{ spawnProgress.error }}
        </div>
      </div>
    </div>

    <!-- ── Orchestrate Message Drawer ────────────────────────────────────────── -->
    <div v-if="orchestrateDrawer.open" class="fixed inset-0 z-50 flex justify-end">
      <div class="absolute inset-0 bg-black/50" @click="orchestrateDrawer.open=false"></div>
      <div class="relative z-10 w-full max-w-lg bg-gray-950 border-l border-gray-800 flex flex-col h-full shadow-2xl">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
          <div><div class="text-white font-semibold">🎯 Orchestrate Message</div><div class="text-gray-500 text-xs mt-0.5">Send a message via any agent</div></div>
          <button @click="orchestrateDrawer.open=false" class="text-gray-500 hover:text-gray-300 text-xl">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
          <div>
            <label class="text-xs text-gray-500 block mb-1">User Telegram ID</label>
            <input v-model="orchestrateDrawer.userId" placeholder="6759764460" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 font-mono" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Agent</label>
            <select v-model="orchestrateDrawer.agentName" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500">
              <option v-for="inst in state.instances" :key="inst.name" :value="inst.name" class="capitalize">{{ inst.name }}</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Chat Type</label>
            <div class="flex gap-2">
              <button @click="orchestrateDrawer.chatType='dm'" :class="orchestrateDrawer.chatType==='dm'?'bg-blue-600 text-white':'bg-gray-800 text-gray-400'" class="flex-1 text-xs py-1.5 rounded-lg transition-colors">DM</button>
              <button @click="orchestrateDrawer.chatType='group'" :class="orchestrateDrawer.chatType==='group'?'bg-blue-600 text-white':'bg-gray-800 text-gray-400'" class="flex-1 text-xs py-1.5 rounded-lg transition-colors">Group</button>
            </div>
          </div>
          <div v-if="orchestrateDrawer.chatType==='group'">
            <label class="text-xs text-gray-500 block mb-1">Group Chat ID</label>
            <input v-model="orchestrateDrawer.groupChatId" placeholder="-1001234567890" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 font-mono" />
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Message</label>
            <textarea v-model="orchestrateDrawer.message" rows="4" placeholder="Message to send..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 resize-none"></textarea>
          </div>
          <div v-if="orchestrateDrawer.result" class="p-3 rounded-lg text-xs" :class="orchestrateDrawer.result.error?'bg-red-900/20 border border-red-800 text-red-300':'bg-green-900/20 border border-green-800 text-green-300'">
            {{ orchestrateDrawer.result.error || orchestrateDrawer.result.agent_reply || 'Sent ✓' }}
          </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-800 flex justify-end gap-2 shrink-0">
          <button @click="orchestrateDrawer.open=false" class="px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium">Close</button>
          <button @click="sendOrchestrate" :disabled="orchestrateDrawer.sending||!orchestrateDrawer.userId||!orchestrateDrawer.message"
            class="px-4 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white text-xs font-medium">
            {{ orchestrateDrawer.sending ? 'Sending…' : '▶ Send' }}
          </button>
        </div>
      </div>
    </div>

    <!-- ── Create Skill Drawer ────────────────────────────────────────────────── -->
    <div v-if="createSkillDrawer.open" class="fixed inset-0 z-50 flex justify-end">
      <div class="absolute inset-0 bg-black/50" @click="createSkillDrawer.open=false"></div>
      <div class="relative z-10 w-full max-w-lg bg-gray-950 border-l border-gray-800 flex flex-col h-full shadow-2xl">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
          <div><div class="text-white font-semibold">⚡ Create Skill</div><div class="text-gray-500 text-xs mt-0.5">Add a new skill to the fleet</div></div>
          <button @click="createSkillDrawer.open=false" class="text-gray-500 hover:text-gray-300 text-xl">✕</button>
        </div>
        <div class="flex-1 flex items-center justify-center text-gray-600 text-sm">
          <div class="text-center">
            <div class="text-3xl mb-3">⚡</div>
            <div>Use the <strong class="text-gray-400">Skills</strong> page to manage skills.</div>
            <button @click="createSkillDrawer.open=false" class="mt-4 px-4 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-medium">Go to Skills</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Drawer overlay -->
    <transition name="drawer">
      <div v-if="drawer.open"
           class="fixed top-0 right-0 h-full w-[420px] bg-gray-950 border-l border-gray-800 flex flex-col z-30 shadow-2xl">
        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 shrink-0">
          <div class="text-sm font-semibold text-gray-200 truncate">
            {{ drawer.conv?.title || drawer.conv?.platform_conversation_id || 'Conversation' }}
          </div>
          <button @click="drawer.open = false"
                  class="text-gray-500 hover:text-gray-200 transition-colors text-lg leading-none">✕</button>
        </div>
        <!-- Messages -->
        <div id="drawer-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
          <div v-if="drawer.loading" class="text-xs text-gray-600 text-center py-8">Loading…</div>
          <template v-else>
            <div v-for="(m, i) in drawer.messages" :key="i"
                 class="flex" :class="m.role === 'user' ? 'justify-end' : 'justify-start'">
              <div class="max-w-[80%] rounded-xl px-3 py-2 text-xs leading-relaxed"
                   :class="m.role === 'user'
                     ? 'bg-blue-600 text-white rounded-br-sm'
                     : 'bg-gray-800 text-gray-200 rounded-bl-sm'">
                <div class="whitespace-pre-wrap">{{ m.content }}</div>
                <div class="text-xs mt-1 opacity-50">{{ fmtDate(m.created_at) }}</div>
              </div>
            </div>
            <div v-if="!drawer.messages.length" class="text-xs text-gray-600 text-center py-8">No messages</div>
          </template>
        </div>
        <!-- Compose -->
        <div class="px-4 py-3 border-t border-gray-800 flex gap-2 shrink-0">
          <textarea v-model="drawer.inputText" rows="2"
                    placeholder="Type a message… (Enter to send)"
                    @keydown="drawerKeydown"
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 outline-none focus:border-blue-500 resize-none"></textarea>
          <button @click="sendDrawerMessage" :disabled="drawer.sending || !drawer.inputText.trim()"
                  class="px-3 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-xs text-white transition-colors shrink-0">
            {{ drawer.sending ? '…' : 'Send' }}
          </button>
        </div>
      </div>
    </transition>
    <!-- Backdrop -->
    <div v-if="drawer.open" @click="drawer.open = false"
         class="fixed inset-0 z-29 bg-black/40"></div>
  `,
};

// ─── Mount ────────────────────────────────────────────────────────────────────
const app = Vue.createApp(App);
app.use(router);
app.mount('#app');
</script>
</body>
</html>
